{% extends "base.html" %}
{% load core_tags %}

{% block title %}프로필 수정{% endblock %}

{% block extra_head %}
<style>header.fixed{display:none!important}main{padding-top:0!important}</style>
{% endblock %}

{% block content %}
<!-- Sub Page Header -->
<div class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-xl border-b border-outline-variant/30 shadow-sm h-16 flex items-center px-5">
    <a href="{% url 'core:profile' %}" class="text-on-surface hover:text-ocean-blue active:scale-95 transition w-10 h-10 flex items-center justify-center -ml-2 rounded-full hover:bg-surface-container-high">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
        </svg>
    </a>
    <h1 class="absolute left-1/2 -translate-x-1/2 text-[16px] font-semibold text-on-surface">프로필 수정</h1>
</div>

<div class="px-5 pt-4 pb-8 max-w-lg mx-auto">
    <!-- Avatar -->
    <div class="flex flex-col items-center mb-8">
        <div class="w-20 h-20 rounded-full bg-ocean-blue/10 flex items-center justify-center text-ocean-blue text-[28px] font-bold mb-3">
            {{ user.get_full_name|default:user.username|truncatechars:1 }}
        </div>
        <p class="text-[14px] text-on-surface-variant">{{ user.username }}</p>
    </div>

    <form method="post" class="flex flex-col gap-5">
        {% csrf_token %}

        <!-- Last Name -->
        <div>
            <label for="last_name" class="block text-[12px] font-semibold text-on-surface-variant mb-1.5 tracking-wider">성</label>
            <input type="text" id="last_name" name="last_name" value="{{ user.last_name }}"
                   class="w-full px-4 py-3 rounded-xl border border-outline-variant/30 bg-surface text-[14px] text-on-surface placeholder-outline focus:border-ocean-blue focus:ring-1 focus:ring-ocean-blue/20 outline-none transition-all"
                   placeholder="성을 입력하세요">
        </div>

        <!-- First Name -->
        <div>
            <label for="first_name" class="block text-[12px] font-semibold text-on-surface-variant mb-1.5 tracking-wider">이름</label>
            <input type="text" id="first_name" name="first_name" value="{{ user.first_name }}"
                   class="w-full px-4 py-3 rounded-xl border border-outline-variant/30 bg-surface text-[14px] text-on-surface placeholder-outline focus:border-ocean-blue focus:ring-1 focus:ring-ocean-blue/20 outline-none transition-all"
                   placeholder="이름을 입력하세요">
        </div>

        <!-- Phone -->
        <div>
            <label for="phone" class="block text-[12px] font-semibold text-on-surface-variant mb-1.5 tracking-wider">연락처</label>
            <input type="tel" id="phone" name="phone" value="{% if user.phone %}{{ user.phone }}{% endif %}"
                   class="w-full px-4 py-3 rounded-xl border border-outline-variant/30 bg-surface text-[14px] text-on-surface placeholder-outline focus:border-ocean-blue focus:ring-1 focus:ring-ocean-blue/20 outline-none transition-all"
                   placeholder="010-0000-0000">
        </div>

        <!-- Email (read-only) -->
        <div>
            <label for="email" class="block text-[12px] font-semibold text-on-surface-variant mb-1.5 tracking-wider">이메일</label>
            <input type="email" id="email" value="{{ user.email }}" readonly disabled
                   class="w-full px-4 py-3 rounded-xl border border-outline-variant/20 bg-surface-container-low text-[14px] text-outline cursor-not-allowed">
            <p class="mt-1 text-[11px] text-outline">이메일은 변경할 수 없습니다</p>
        </div>

        <!-- Submit -->
        <button type="submit"
                class="w-full mt-4 py-3.5 bg-ocean-blue text-white text-[14px] font-bold rounded-xl hover:opacity-90 active:scale-[0.98] transition-all shadow-sm">
            저장하기
        </button>
    </form>
</div>
{% endblock %}
