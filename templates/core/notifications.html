{% extends "base.html" %}

{% block title %}알림{% endblock %}

{% block navbar %}
<header class="app-header w-full z-50 bg-surface/80 backdrop-blur-xl border-b border-outline-variant/20 shadow-sm flex-shrink-0">
    <div class="flex items-center justify-between px-5 h-12">
        <div class="flex items-center gap-2">
            <a href="javascript:history.back()" class="w-10 h-10 flex items-center justify-center -ml-2 text-on-surface">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" /></svg>
            </a>
            <h1 class="text-[17px] font-bold text-on-surface">알림</h1>
        </div>
        <a href="{% url 'core:home' %}" class="flex-shrink-0">
            <span class="text-ocean-blue text-[22px] font-extrabold tracking-tight">로이브</span>
        </a>
    </div>
</header>
{% endblock %}

{% block content %}

<div class="px-4">
    <!-- Today Section (sample) -->
    <div class="mb-6">
        <h2 class="text-[12px] font-bold text-outline tracking-wider mb-3">오늘</h2>
        <div class="flex flex-col gap-2">
            <div class="flex items-start gap-3 p-4 bg-ocean-blue/5 border border-ocean-blue/10 rounded-xl">
                <div class="w-10 h-10 rounded-full bg-ocean-blue/10 flex items-center justify-center shrink-0 mt-0.5">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-ocean-blue">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
                    </svg>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-[14px] font-semibold text-on-surface mb-0.5">LOIVE에 오신 것을 환영합니다!</p>
                    <p class="text-[13px] text-on-surface-variant leading-relaxed">다양한 로컬 체험을 탐색하고 특별한 경험을 만들어보세요.</p>
                    <p class="text-[11px] text-outline mt-1.5">방금 전</p>
                </div>
                <div class="w-2 h-2 rounded-full bg-ocean-blue shrink-0 mt-2"></div>
            </div>
        </div>
    </div>

    <!-- Empty notice -->
    <div class="text-center py-12">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1" stroke="currentColor" class="w-14 h-14 mx-auto mb-4 text-outline-variant">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
        </svg>
        <p class="text-[15px] font-semibold text-on-surface mb-1">모든 알림을 확인했어요</p>
        <p class="text-[13px] text-on-surface-variant">새로운 소식이 있으면 알려드릴게요.</p>
    </div>
</div>
{% endblock %}
