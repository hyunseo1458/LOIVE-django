{% extends "base.html" %}

{% block title %}비밀번호 찾기{% endblock %}

{% block navbar %}
<header class="app-header w-full z-50 bg-surface/80 backdrop-blur-xl border-b border-outline-variant/20 shadow-sm flex-shrink-0">
    <div class="flex items-center justify-between px-5 h-12">
        <div class="flex items-center gap-2">
            <a href="javascript:history.back()" class="w-10 h-10 flex items-center justify-center -ml-2 text-on-surface">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" /></svg>
            </a>
            <h1 class="text-[17px] font-bold text-on-surface">비밀번호 찾기</h1>
        </div>
        <a href="{% url 'core:home' %}" class="flex-shrink-0">
            <span class="text-ocean-blue text-[22px] font-extrabold tracking-tight">로이브</span>
        </a>
    </div>
</header>
{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex flex-col items-center justify-center px-5">
    <div class="w-full max-w-sm flex flex-col items-center">
        <span class="text-ocean-blue text-[32px] font-extrabold tracking-tight mb-2">비밀번호 찾기</span>
        <p class="text-[14px] text-on-surface-variant text-center mb-8">가입한 이메일 주소를 입력하시면 비밀번호 재설정 링크를 보내드립니다.</p>

        <form method="post" class="w-full flex flex-col gap-3 mb-6">
            {% csrf_token %}
            <input type="email" name="email" placeholder="이메일" required
                   class="w-full h-12 px-4 rounded-lg bg-surface-container-lowest border border-outline-variant/30 text-[14px] focus:outline-none focus:ring-2 focus:ring-ocean-blue/20 focus:border-ocean-blue transition-all">
            <button type="submit"
                    class="w-full h-12 bg-ocean-blue text-on-primary text-[16px] font-semibold rounded-lg shadow-sm hover:opacity-90 transition-all active:scale-[0.98]">
                재설정 링크 보내기
            </button>
        </form>

        <a href="{% url 'account_login' %}" class="text-[14px] text-outline hover:text-ocean-blue transition-colors">로그인으로 돌아가기</a>
    </div>
</div>
{% endblock %}
