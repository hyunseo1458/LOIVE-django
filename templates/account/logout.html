{% extends "base.html" %}

{% block title %}로그아웃{% endblock %}

{% block navbar %}
<header class="app-header w-full z-50 bg-surface/80 backdrop-blur-xl border-b border-outline-variant/20 shadow-sm flex-shrink-0">
    <div class="flex items-center justify-between px-5 h-12">
        <div class="flex items-center gap-2">
            <a href="javascript:history.back()" class="w-10 h-10 flex items-center justify-center -ml-2 text-on-surface">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" /></svg>
            </a>
            <h1 class="text-[17px] font-bold text-on-surface">로그아웃</h1>
        </div>
        <a href="{% url 'core:home' %}" class="flex-shrink-0">
            <span class="text-ocean-blue text-[22px] font-extrabold tracking-tight">로이브</span>
        </a>
    </div>
</header>
{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex flex-col items-center justify-center px-5">
    <div class="w-full max-w-sm flex flex-col items-center text-center">
        <span class="text-ocean-blue text-[32px] font-extrabold tracking-tight mb-4">로그아웃</span>
        <p class="text-[16px] text-on-surface-variant mb-8">정말 로그아웃하시겠습니까?</p>
        <form method="post" class="w-full flex flex-col gap-3">
            {% csrf_token %}
            <button type="submit"
                    class="w-full h-12 bg-ocean-blue text-on-primary text-[16px] font-semibold rounded-lg shadow-md hover:opacity-90 transition-all active:scale-[0.98]">
                로그아웃
            </button>
            <a href="{% url 'core:home' %}"
               class="w-full h-12 rounded-lg border border-outline-variant/30 text-[16px] font-semibold text-on-surface-variant flex items-center justify-center hover:bg-surface-container-low transition-all">
                취소
            </a>
        </form>
    </div>
</div>
{% endblock %}
