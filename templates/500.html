<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서버 오류 | LOIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'ocean-blue': '#007aff',
                        'error-red': '#ff3b30',
                        'on-surface': '#181c23',
                        'on-surface-variant': '#414755',
                        background: '#f5f5f7',
                    },
                    fontFamily: {
                        sans: ['Pretendard Variable', 'Pretendard', 'system-ui', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
</head>
<body class="min-h-screen bg-background font-sans flex items-center justify-center px-6">
    <div class="text-center max-w-md">
        <div class="mb-6">
            <span class="text-[80px] font-black text-error-red/20 leading-none block">500</span>
        </div>
        <h1 class="text-[22px] font-bold text-on-surface mb-3">서버 오류가 발생했습니다</h1>
        <p class="text-[14px] text-on-surface-variant leading-relaxed mb-8">일시적인 문제가 발생했습니다. 잠시 후 다시 시도해주세요.<br>문제가 지속되면 고객센터로 문의해주세요.</p>
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="/"
               class="px-8 py-3 bg-ocean-blue text-white text-[14px] font-semibold rounded-xl hover:opacity-90 transition-all active:scale-95">
                홈으로 돌아가기
            </a>
            <button onclick="location.reload()"
                    class="px-8 py-3 bg-white border border-gray-200 text-on-surface text-[14px] font-semibold rounded-xl hover:bg-gray-50 transition-all active:scale-95">
                다시 시도
            </button>
        </div>
        <a href="/" class="inline-block mt-10">
            <span class="text-ocean-blue text-xl font-extrabold tracking-tight">LOIVE</span>
        </a>
    </div>
</body>
</html>
