{% load static core_tags %}

<header class="app-header global-nav w-full z-50 bg-surface/80 backdrop-blur-xl border-b border-outline-variant/20 shadow-sm flex-shrink-0">
    <div class="flex items-center justify-between px-5 h-12 w-full max-w-7xl mx-auto">
        <!-- Fixed location: Jeju -->
        <div class="flex items-center gap-1.5">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 text-ocean-blue">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
            </svg>
            <span class="text-[16px] md:text-[18px] font-bold text-on-surface">{% t "Jeju" "제주" %}</span>
        </div>

        <!-- Right: Lang toggle + Logo -->
        <div class="flex items-center gap-3">
            {% include "components/lang_toggle.html" %}
            <a href="{% url 'core:home' %}" class="flex-shrink-0">
                <span class="text-ocean-blue text-[22px] font-extrabold tracking-tight">LOIVE</span>
            </a>
        </div>
    </div>
</header>
