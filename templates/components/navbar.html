{% load static core_tags %}

<header class="app-header global-nav w-full z-50 bg-surface/80 backdrop-blur-xl border-b border-outline-variant/20 shadow-sm flex-shrink-0">
    <div class="flex items-center justify-between px-5 h-12 w-full max-w-7xl mx-auto">
        <!-- Hallabong + Jeju -->
        <div class="flex items-center gap-1.5">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="w-7 h-7">
                <circle cx="12" cy="14" r="8.5" fill="#F97316"/>
                <circle cx="8.5" cy="12" r="0.6" fill="#EA580C" opacity="0.4"/>
                <circle cx="15.5" cy="12" r="0.6" fill="#EA580C" opacity="0.4"/>
                <circle cx="12" cy="16" r="0.6" fill="#EA580C" opacity="0.4"/>
                <circle cx="9.5" cy="16.5" r="0.6" fill="#EA580C" opacity="0.4"/>
                <circle cx="15" cy="15.5" r="0.6" fill="#EA580C" opacity="0.4"/>
                <circle cx="12" cy="19" r="0.6" fill="#EA580C" opacity="0.4"/>
                <ellipse cx="9.5" cy="10.5" rx="2.5" ry="2" fill="#FDBA74" opacity="0.45"/>
                <path d="M12 5.5 C12 5.5, 8 2.5, 6 4.5 C4 6.5, 7 7.5, 12 5.5Z" fill="#16A34A"/>
                <path d="M12 5.5 C12 5.5, 16 2.5, 18 4.5 C20 6.5, 17 7.5, 12 5.5Z" fill="#22C55E"/>
            </svg>
            <span class="text-[16px] md:text-[18px] font-bold text-on-surface">{% t "Jeju" "제주" %}</span>
        </div>

        <!-- Right: Lang toggle + Logo -->
        <div class="flex items-center gap-3">
            {% include "components/lang_toggle.html" %}
            <a href="{% url 'core:home' %}" class="flex items-center gap-0.5 flex-shrink-0">
                <img src="{% static 'images/dolhareubang.png' %}" alt="" class="w-8 h-8 object-contain" style="image-rendering: -webkit-optimize-contrast;">
                <span class="text-ocean-blue text-[22px] font-extrabold tracking-tight">LOIVE</span>
            </a>
        </div>
    </div>
</header>
