{% load core_tags %}

<nav class="mx-3 z-50 rounded-[18px] flex justify-around items-center px-3 h-[68px]"
     style="margin-bottom: calc(env(safe-area-inset-bottom, 0px) + 10px);
            background: rgba(245, 245, 247, 0.72);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08), 0 1px 3px rgba(0, 0, 0, 0.04), inset 0 1px 0 rgba(255, 255, 255, 0.5);">
    {% with path=request.path %}

    <a href="{% url 'core:home' %}" class="flex flex-col items-center justify-center active:scale-90 transition-all w-[72px] h-full {% if path == '/' %}text-ocean-blue{% else %}text-[#8E8E93] hover:text-on-surface{% endif %}">
        {% if path == '/' %}
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-[22px] h-[22px]">
            <path d="m11.47 3.841a.75.75 0 0 1 1.06 0l8.69 8.69a.75.75 0 1 0 1.06-1.061l-8.689-8.69a2.25 2.25 0 0 0-3.182 0l-8.69 8.69a.75.75 0 1 0 1.061 1.06l8.69-8.689Z" />
            <path d="m12 5.432 8.159 8.159c.03.03.06.058.091.086v6.198c0 1.035-.84 1.875-1.875 1.875H15a.75.75 0 0 1-.75-.75v-4.5a.75.75 0 0 0-.75-.75h-3a.75.75 0 0 0-.75.75V21a.75.75 0 0 1-.75.75H5.625a1.875 1.875 0 0 1-1.875-1.875v-6.198a2.29 2.29 0 0 0 .091-.086L12 5.432Z" />
        </svg>
        {% else %}
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-[22px] h-[22px]">
            <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
        </svg>
        {% endif %}
        <span class="text-[10px] font-semibold tracking-wide mt-1">홈</span>
    </a>

    <a href="{% url 'activities:explore' %}" class="flex flex-col items-center justify-center active:scale-90 transition-all w-[72px] h-full {% if '/activities' in path %}text-ocean-blue{% else %}text-[#8E8E93] hover:text-on-surface{% endif %}">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-[22px] h-[22px]">
            <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
        </svg>
        <span class="text-[10px] font-semibold tracking-wide mt-1">탐색</span>
    </a>

    <a href="{% url 'bookings:history' %}" class="flex flex-col items-center justify-center active:scale-90 transition-all w-[72px] h-full {% if '/bookings' in path %}text-ocean-blue{% else %}text-[#8E8E93] hover:text-on-surface{% endif %}">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-[22px] h-[22px]">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" />
        </svg>
        <span class="text-[10px] font-semibold tracking-wide mt-1">예약</span>
    </a>

    <a href="{% url 'core:profile' %}" class="flex flex-col items-center justify-center active:scale-90 transition-all w-[72px] h-full {% if '/profile' in path %}text-ocean-blue{% else %}text-[#8E8E93] hover:text-on-surface{% endif %}">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-[22px] h-[22px]">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
        </svg>
        <span class="text-[10px] font-semibold tracking-wide mt-1">마이</span>
    </a>

    {% endwith %}
</nav>
